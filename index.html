<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Photo</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* Center image */
.container {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Image styling */
img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}
</style>
</head>
<body>

<div class="container">
  <img src="https://drive.google.com/uc?export=view&id=1hs9VYu1hsn_roh0ekk3UlRPwlGaPgc1L&confirm=t"
       onerror="this.src='https://via.placeholder.com/600x800?text=Image+Loading+Failed';" />
</div>

</body>
</html>
